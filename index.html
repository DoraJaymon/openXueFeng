<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="OpenXueFeng：汇聚本科专业、职业发展规划与志愿分析资源。">
  <title>OpenXueFeng</title>
  <style>
    :root {
      --bg: #f6f4ee;
      --panel: #fffdf8;
      --text: #1f2937;
      --muted: #6b7280;
      --line: #e5dccd;
      --accent: #9f5a2b;
      --accent-dark: #7f451d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
      background: radial-gradient(circle at top left, #fff9ef 0, var(--bg) 45%, #f1eee6 100%);
      color: var(--text);
    }
    .wrap {
      max-width: 980px;
      margin: 0 auto;
      padding: 48px 20px 72px;
    }
    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: .04em;
      background: rgba(255,255,255,.7);
    }
    h1 {
      margin: 18px 0 12px;
      font-size: clamp(32px, 6vw, 56px);
      line-height: 1.05;
    }
    .intro {
      max-width: 720px;
      color: var(--muted);
      font-size: 17px;
      line-height: 1.85;
    }
    .section-title {
      margin: 44px 0 14px;
      font-size: 14px;
      color: var(--muted);
      letter-spacing: .08em;
      text-transform: uppercase;
    }
    .card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 22px 22px 18px;
      box-shadow: 0 10px 30px rgba(31, 41, 55, .06);
    }
    .card h2 {
      margin: 0 0 8px;
      font-size: 24px;
    }
    .card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.8;
    }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
    }
    .meta span {
      padding: 6px 10px;
      border-radius: 999px;
      background: #f8efe2;
      color: var(--accent-dark);
      font-size: 13px;
      font-weight: 600;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .actions a {
      text-decoration: none;
      border-radius: 999px;
      padding: 11px 16px;
      font-weight: 700;
      font-size: 14px;
    }
    .actions a.primary {
      background: var(--accent);
      color: white;
    }
    .actions a.secondary {
      border: 1px solid var(--line);
      color: var(--text);
      background: white;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <span class="eyebrow">OpenXueFeng</span>
    <h1>本科专业、职业发展规划与志愿分析资源</h1>
    <p class="intro">
      这个仓库用于持续汇聚与升学、专业选择、职业路径和招录机会相关的分析页面、公开数据和 AI 可读说明。
      当前上线的是本科专业方向下的第一批资源。
    </p>

    <div class="section-title">本科专业</div>
    <section class="card">
      <h2>本科专业考编战力排行榜</h2>
      <p>
        基于 2026 年国考及云南、山东、湖北、江苏省考公开职位表，对 840 个本科专业和 93 个专业类做机会规模、直接对口、独占性与排行榜分析。
      </p>
      <div class="meta">
        <span>840 个专业</span>
        <span>93 个专业类</span>
        <span>公开 CSV</span>
        <span>AI 可读 guide</span>
      </div>
      <div class="actions">
        <a class="primary" href="./本科专业分析/公考对口分析/">进入项目</a>
        <a class="secondary" href="./本科专业分析/公考对口分析/docs/guide.md">查看 guide</a>
      </div>
    </section>
  </main>
</body>
</html>
